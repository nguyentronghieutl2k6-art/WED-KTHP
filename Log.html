<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth UI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    .overlay{
        position:fixed;
        inset:0;
        background-image: url('anh_nen.jpg');
        background-size: cover;      
        background-position: center; 
        background-repeat: no-repeat;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
        z-index: 1000;
    }

    .login-card,
    .signup-panel{
        background: rgba(255, 255, 255, 0.2); 
        backdrop-filter: blur(10px);          
        border: 1px solid rgba(255, 255, 255, 0.3);
        width:450px;
        background:#fff;
        padding:35px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        position:relative;
        transition:0.3s;
    }

    .hidden{
    opacity: 0;
    pointer-events: none;
    transform: scale(0.9); 
    position: absolute;
    }

    h1,h2{
        margin-bottom:8px;
    }

    .subtitle{
        font-size:13px;
        color:#666;
        margin-bottom:10px;
    }

    .switch-text,
    .signin-text{
        font-size:13px;
        color:#888;
        margin-bottom:15px;
    }

    .switch-text a,
    .signin-text a{
        color:#3B82F6;
        text-decoration:none;
        font-weight:600;
    }

    .switch-text a:hover,
    .signin-text a:hover{
        text-decoration:underline;
    }

    .social-group{
        display:flex;
        gap:10px;
        margin-bottom:15px;
    }

    .social-item{
        flex:1;
        height:45px;
        display:flex;
        align-items:center;
        justify-content:center;
        border:1px solid #eee;
        border-radius:8px;
        background:#fff;
        cursor:pointer;
        transition:0.2s;
    }

    .social-item:hover{
        background:#f7f7f7;
    }

    .social-item img,
    .social-item i{
        width:20px;
        height:20px;
    }

    .fa-facebook-f{
        color:#1877F2;
    }

    .divider{
        display:flex;
        align-items:center;

        margin:15px 0;

        font-size:13px;
        color:#aaa;
    }

    .divider::before,
    .divider::after{
        content:"";
        flex:1;
        height:1px;
        background:#eee;
    }

    .divider span{
        padding:0 8px;
    }

    input{
        width:100%;
        padding:10px;
        margin-bottom:10px;
        border:1px solid #eee;
        border-radius:6px;
        outline:none;
        transition:0.2s;
    }

    input:focus{
        border-color:#3B82F6;
    }

    .error{
        border-color:red !important;
    }

    .error-text{
        color:red;
        font-size:12px;
        margin-bottom:10px;
        display:none;
    }

    .password-box{
        position:relative;
    }

    .toggle-password{
        position:absolute;
        right:12px;
        top:50%;
        transform:translateY(-70%);
        cursor:pointer;
        color:#666;
    }

    .btn-signin,
    .btn-signup{
        width:100%;
        padding:10px;
        background:#3B82F6;
        color:white;
        border:none;
        border-radius:6px;
        font-weight:bold;
        cursor:pointer;
        transition:0.2s;
    }

    .btn-signin:hover,
    .btn-signup:hover{
        background:#2563EB;
    }

    .close-btn{
        position:absolute;
        top:10px;
        right:10px;
        border:none;
        background:none;
        font-size:18px;
        cursor:pointer;
        color:#666;
    }

    .close-btn:hover{
        color:black;
    }
</style>
</head>

<body>
    <div class="overlay" id="overlay">
        <div class="login-card">
            <button class="close-btn">&times;</button>
            <h1>Sign in</h1>
            <p class="subtitle">
                Get access to more learning features
            </p>
            <p class="switch-text">
                Don't have an account?
                <a href="#" id="toSignup">Register</a>
            </p>

            <div class="social-group">
                <button class="social-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
                </button>
                <button class="social-item">
                    <i class="fab fa-facebook-f"></i>
                </button>
                <button class="social-item">
                    <i class="fab fa-github"></i>
                </button>
            </div>

            <div class="divider">
                <span>or</span>
            </div>

            <input type="email" id="loginEmail" placeholder="Email">
            <p class="error-text" id="emailError"></p>

                <div class="password-box">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <i class="far fa-eye toggle-password"></i>
                </div>

                <p class="error-text" id="passwordError"></p>

                <button class="btn-signin">
                    Sign in
                </button>
            </div>

            <div class="signup-panel hidden">
                <button class="close-btn">&times;</button>
                <h2>Register</h2>
                <p class="signin-text">
                    Already have an account?
                    <a href="#" id="toLogin">Sign in</a>
                </p>

                <div class="social-group">
                    <button class="social-item">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
                    </button>
                    <button class="social-item">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                    <button class="social-item">
                        <i class="fab fa-github"></i>
                    </button>
                </div>

                <div class="divider">
                    <span>or</span>
                </div>

                <input type="email" id="signupEmail" placeholder="Email">
                <p class="error-text" id="signupEmailError"></p>

                <input type="text" id="firstName" placeholder="First name">
                <p class="error-text" id="firstNameError"></p>

                <input type="text" id="lastName" placeholder="Last name">
                <p class="error-text" id="lastNameError"></p>

                <div class="password-box">
                    <input type="password" id="signupPassword" placeholder="Password">
                    <i class="far fa-eye toggle-password"></i>
                </div>

                <p class="error-text" id="signupPasswordError"></p>

                <button class="btn-signup">
                    Create account
                </button>
            </div>
        </div>

        <script>
        const login = document.querySelector(".login-card");
        const signup = document.querySelector(".signup-panel");
        const overlay = document.getElementById("overlay");
        document.getElementById("toSignup").onclick = e => {
            e.preventDefault();
            login.classList.add("hidden");
            signup.classList.remove("hidden");
        };

        document.getElementById("toLogin").onclick = e => {
            e.preventDefault();
            signup.classList.add("hidden");
            login.classList.remove("hidden");
        };

        document.querySelectorAll(".close-btn").forEach(btn => {
            btn.onclick = () => {
                overlay.style.display = "none";
            };
        });

        overlay.onclick = e => {
            if(e.target === overlay){
                overlay.style.display = "none";
            }
        };

        document.onkeydown = e => {
            if(e.key === "Escape"){
                overlay.style.display = "none";
            }
        };

        document.querySelectorAll(".toggle-password").forEach(icon => {
            icon.addEventListener("click", () => {
                const input = icon.previousElementSibling;
                if(input.type === "password"){
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                }else{
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            });
        });

        document.querySelector(".btn-signin").onclick = () => {
            const email = document.getElementById("loginEmail");
            const password = document.getElementById("loginPassword");
            const emailError = document.getElementById("emailError");
            const passwordError = document.getElementById("passwordError");

            email.classList.remove("error");
            password.classList.remove("error");
            emailError.style.display = "none";
            passwordError.style.display = "none";
            let isValid = true;

            if(email.value.trim() === ""){
                email.classList.add("error");
                emailError.innerText = "Please enter your email address.";
                emailError.style.display = "block";
                isValid = false;
            }

            else{
                const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
                if(!email.value.match(emailPattern)){
                    email.classList.add("error");
                    emailError.innerText = "Invalid email";
                    emailError.style.display = "block";
                    isValid = false;
                }
            }

            if(password.value.trim() === ""){
                password.classList.add("error");
                passwordError.innerText = "Please enter the password.";
                passwordError.style.display = "block";
                isValid = false;
            }

            if(isValid){
                alert("Login successful!");
                localStorage.setItem("isLoggedIn", "true"); 
                localStorage.setItem("userEmail", email.value);
                window.location.href = "Home.html";
            }
        };

        document.querySelector(".btn-signup").onclick = () => {
            const email = document.getElementById("signupEmail");
            const firstName = document.getElementById("firstName");
            const lastName = document.getElementById("lastName");
            const password = document.getElementById("signupPassword");
            const emailError = document.getElementById("signupEmailError");
            const firstNameError = document.getElementById("firstNameError");
            const lastNameError = document.getElementById("lastNameError");
            const passwordError = document.getElementById("signupPasswordError");

            [email, firstName, lastName, password].forEach(input => {
                input.classList.remove("error");
            });

            [emailError, firstNameError, lastNameError, passwordError].forEach(err => {
                err.style.display = "none";
            });

            let isValid = true;

            if(email.value.trim() === ""){
                email.classList.add("error");
                emailError.innerText = "Please enter your email address.";
                emailError.style.display = "block";
                isValid = false;
            }
            else{
                const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
                if(!email.value.match(emailPattern)){
                    email.classList.add("error");
                    emailError.innerText = "Invalid email";
                    emailError.style.display = "block";
                    isValid = false;
                }

            }

            if(firstName.value.trim() === ""){
                firstName.classList.add("error");
                firstNameError.innerText = "Please enter your First Name";
                firstNameError.style.display = "block";
                isValid = false;
            }

            if(lastName.value.trim() === ""){
                lastName.classList.add("error");
                lastNameError.innerText = "Please enter your Last Name";
                lastNameError.style.display = "block";
                isValid = false;
            }

            if(password.value.trim() === ""){
                password.classList.add("error");
                passwordError.innerText = "Please enter the password.";
                passwordError.style.display = "block";
                isValid = false;
            }

            if(isValid){
                alert("Registration successful!");
                localStorage.setItem("isLoggedIn", "true"); 
                localStorage.setItem("userEmail", email.value);
                window.location.href = "Home.html";
            }
        };
        </script>
    </body>
</html>
