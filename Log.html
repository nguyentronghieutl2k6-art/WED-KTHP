<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth UI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
    45deg,
    #d1d5db,
    #9ca3af
    );
}

/* OVERLAY */
.overlay{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.login-card,
.signup-panel{

    width:450px; /* to hơn */

    background:#fff;

    padding:35px;

    border-radius:20px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.2);

    position:absolute;

    transition:.3s;
}

/* ẩn panel */
.hidden{
    opacity:0;
    pointer-events:none;
    transform:scale(.9);
}

/* TEXT */
h1,h2{
    text-align:center;
    margin-bottom:12px;
}

.subtitle,
.switch-text,
.signin-text{

    text-align:center;

    font-size:14px;

    color:#666;

    margin-bottom:20px;
}

/* LINK */
.switch-text a,
.signin-text a{
    color:#2563EB;
    text-decoration:none;
    font-weight:bold;
}

/* SOCIAL */
.social-group{

    display:flex;

    gap:12px;

    margin-bottom:20px;
}

.social-item{

    flex:1;

    height:50px;

    border:1px solid #ddd;

    border-radius:10px;

    background:white;

    cursor:pointer;
}

.social-item:hover{
    background:#f3f4f6;
}

/* divider */

.divider{

    display:flex;
    align-items:center;

    margin:20px 0;

    color:#999;
}

.divider::before,
.divider::after{

    content:"";

    flex:1;

    height:1px;

    background:#ddd;
}

.divider span{
    padding:0 10px;
}

/* INPUT */

input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:15px;
}

input:focus{

    border-color:#3B82F6;

    outline:none;
}

/* PASSWORD */

.password-box{
    position:relative;
}

.toggle-password{

    position:absolute;

    right:15px;

    top:35%;

    cursor:pointer;
}

/* BUTTON */

.btn-signin,
.btn-signup{

    width:100%;

    padding:14px;

    background:#2563EB;

    color:white;

    border:none;

    border-radius:10px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;
}

.btn-signin:hover,
.btn-signup:hover{

    background:#1E40AF;
}

/* CLOSE */

.close-btn{

    position:absolute;

    top:15px;
    right:20px;

    border:none;

    background:none;

    font-size:28px;

    cursor:pointer;
}

/* ERROR */

.error{
    border:1px solid red !important;
}

.error-text{

    color:red;

    font-size:13px;

    margin-bottom:10px;

    display:none;
}

</style>
</head>

<body>

<div class="overlay"></div>

    <!-- LOGIN -->
    <div class="login-card">

        <button class="close-btn">&times;</button>

        <h1>Đăng nhập</h1>

        <p class="subtitle">
            Nhận quyền truy cập vào nhiều tính năng hơn
        </p>

        <p class="switch-text">
            Bạn chưa có tài khoản?
            <a href="#" id="toSignup">Đăng ký</a>
        </p>

        <!-- SOCIAL -->
        <div class="social-group">

            <button class="social-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
            </button>

            <button class="social-item">
                <i class="fab fa-facebook-f"></i>
            </button>

            <button class="social-item">
                <i class="fab fa-github"></i>
            </button>

        </div>

        <div class="divider">
            <span>hoặc</span>
        </div>

        <!-- EMAIL -->
        <input type="email" id="loginEmail" placeholder="Email">
        <p class="error-text" id="emailError"></p>

        <!-- PASSWORD -->
        <div class="password-box">
            <input type="password" id="loginPassword" placeholder="Mật khẩu">
            <i class="far fa-eye toggle-password"></i>
        </div>

        <p class="error-text" id="passwordError"></p>

        <button class="btn-signin">
            Đăng nhập
        </button>

    </div>

    <!-- SIGNUP -->
    <div class="signup-panel hidden">

        <button class="close-btn">&times;</button>

        <h2>Đăng ký</h2>

        <p class="signin-text">
            Bạn đã có tài khoản?
            <a href="#" id="toLogin">Đăng nhập</a>
        </p>

        <!-- SOCIAL -->
        <div class="social-group">

            <button class="social-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
            </button>

            <button class="social-item">
                <i class="fab fa-facebook-f"></i>
            </button>

            <button class="social-item">
                <i class="fab fa-github"></i>
            </button>

        </div>

        <div class="divider">
            <span>hoặc</span>
        </div>

        <!-- SIGNUP EMAIL -->
        <input type="email" id="signupEmail" placeholder="Email">
        <p class="error-text" id="signupEmailError"></p>

        <!-- FIRST NAME -->
        <input type="text" id="firstName" placeholder="Họ">
        <p class="error-text" id="firstNameError"></p>

        <!-- LAST NAME -->
        <input type="text" id="lastName" placeholder="Tên">
        <p class="error-text" id="lastNameError"></p>

        <!-- PASSWORD -->
        <div class="password-box">
            <input type="password" id="signupPassword" placeholder="Mật khẩu">
            <i class="far fa-eye toggle-password"></i>
        </div>

        <p class="error-text" id="signupPasswordError"></p>

        <button class="btn-signup">
            Tạo tài khoản
        </button>

    </div>

</div>

<script>

/* ELEMENT */
const login = document.querySelector(".login-card");
const signup = document.querySelector(".signup-panel");
const overlay = document.querySelector(".overlay");

/* LOGIN -> SIGNUP */
document.getElementById("toSignup").onclick = e => {

    e.preventDefault();

    login.classList.add("hidden");

    signup.classList.remove("hidden");
};

/* SIGNUP -> LOGIN */
document.getElementById("toLogin").onclick = e => {

    e.preventDefault();

    signup.classList.add("hidden");

    login.classList.remove("hidden");
};

/* CLOSE */
document.querySelectorAll(".close-btn").forEach(btn => {

    btn.onclick = () => {
        window.location.href="home.html";
    };

});

/* CLICK OUTSIDE */
overlay.onclick = e => {

    if(e.target === overlay){

        window.location.href = "Home.html";
    }
};

/* ESC */
document.onkeydown = e => {

    if(e.key === "Escape"){

        window.location.href = "Home.html";
    }
};

/* TOGGLE PASSWORD */
document.querySelectorAll(".toggle-password").forEach(icon => {

    icon.addEventListener("click", () => {

        const input = icon.previousElementSibling;

        if(input.type === "password"){

            input.type = "text";

            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");

        }else{

            input.type = "password";

            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }

    });

});

/* LOGIN VALIDATION */
document.querySelector(".btn-signin").onclick = () => {

    const email = document.getElementById("loginEmail");
    const password = document.getElementById("loginPassword");

    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    /* RESET */
    email.classList.remove("error");
    password.classList.remove("error");

    emailError.style.display = "none";
    passwordError.style.display = "none";

    let isValid = true;

    /* EMAIL RỖNG */
    if(email.value.trim() === ""){

        email.classList.add("error");

        emailError.innerText = "Vui lòng nhập email";
        emailError.style.display = "block";

        isValid = false;
    }

    /* EMAIL FORMAT */
    else{

        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

        if(!email.value.match(emailPattern)){

            email.classList.add("error");

            emailError.innerText = "Email không hợp lệ";
            emailError.style.display = "block";

            isValid = false;
        }

    }

    /* PASSWORD */
    if(password.value.trim() === ""){

        password.classList.add("error");

        passwordError.innerText = "Vui lòng nhập password";
        passwordError.style.display = "block";

        isValid = false;
    }

    /* SUCCESS */
    if(isValid){

        alert("Đăng nhập thành công!");

        window.location.href = "home.html";
    }

};

/* SIGNUP VALIDATION */
document.querySelector(".btn-signup").onclick = () => {

    const email = document.getElementById("signupEmail");
    const firstName = document.getElementById("firstName");
    const lastName = document.getElementById("lastName");
    const password = document.getElementById("signupPassword");

    const emailError = document.getElementById("signupEmailError");
    const firstNameError = document.getElementById("firstNameError");
    const lastNameError = document.getElementById("lastNameError");
    const passwordError = document.getElementById("signupPasswordError");

    /* RESET */
    [email, firstName, lastName, password].forEach(input => {
        input.classList.remove("error");
    });

    [emailError, firstNameError, lastNameError, passwordError].forEach(err => {
        err.style.display = "none";
    });

    let isValid = true;

    /* EMAIL */
    if(email.value.trim() === ""){

        email.classList.add("error");

        emailError.innerText = "Vui lòng nhập email";
        emailError.style.display = "block";

        isValid = false;
    }

    else{

        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

        if(!email.value.match(emailPattern)){

            email.classList.add("error");

            emailError.innerText = "Email không hợp lệ";
            emailError.style.display = "block";

            isValid = false;
        }

    }

    /* FIRST NAME */
    if(firstName.value.trim() === ""){

        firstName.classList.add("error");

        firstNameError.innerText = "Vui lòng nhập First Name";
        firstNameError.style.display = "block";

        isValid = false;
    }

    /* LAST NAME */
    if(lastName.value.trim() === ""){

        lastName.classList.add("error");

        lastNameError.innerText = "Vui lòng nhập Last Name";
        lastNameError.style.display = "block";

        isValid = false;
    }

    /* PASSWORD */
    if(password.value.trim() === ""){

        password.classList.add("error");

        passwordError.innerText = "Vui lòng nhập password";
        passwordError.style.display = "block";

        isValid = false;
    }

    /* SUCCESS */
    if(isValid){

        alert("Đăng ký thành công!");

        window.location.href = "home.html";
    }

};

</script>

</body>
</html>
